    <style>
      @import url("https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500&display=swap");

      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html {
        font-family: "Inter", sans-serif;
        color: #1a1a2e;
        background: #fafafa;
      }

      /* ── Animated Background ── */

      .hero {
        position: relative;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 80vh;
        padding: 80px 24px;
        background:
          radial-gradient(
            ellipse at 30% 40%,
            rgba(200, 200, 232, 0.15) 0%,
            transparent 60%
          ),
          radial-gradient(
            ellipse at 70% 60%,
            rgba(13, 110, 110, 0.06) 0%,
            transparent 50%
          ),
          #fafafa;
      }

      /* Gradient pulse */
      .hero::before {
        content: "";
        position: absolute;
        top: 50%;
        left: 50%;
        width: 600px;
        height: 600px;
        transform: translate(-50%, -50%);
        background: radial-gradient(
          circle,
          rgba(180, 180, 220, 0.12) 0%,
          transparent 70%
        );
        animation: pulse 8s ease-in-out infinite;
        pointer-events: none;
      }

      @keyframes pulse {
        0%,
        100% {
          transform: translate(-50%, -50%) scale(1);
          opacity: 0.4;
        }
        50% {
          transform: translate(-50%, -50%) scale(1.25);
          opacity: 0.7;
        }
      }

      /* Floating particles */
      .particle {
        position: absolute;
        border-radius: 50%;
        background: rgba(13, 110, 110, 0.25);
        animation: float linear infinite;
        pointer-events: none;
      }

      @keyframes float {
        0% {
          transform: translateY(100vh) translateX(0);
          opacity: 0;
        }
        8% {
          opacity: 1;
        }
        92% {
          opacity: 1;
        }
        100% {
          transform: translateY(-100vh) translateX(30px);
          opacity: 0;
        }
      }

      /* Scanning grid lines */
      .hero::after {
        content: "";
        position: absolute;
        inset: 0;
        background: repeating-linear-gradient(
          to bottom,
          transparent,
          transparent 79px,
          rgba(0, 0, 0, 0.015) 79px,
          rgba(0, 0, 0, 0.015) 80px
        );
        animation: scan 20s linear infinite;
        pointer-events: none;
      }

      @keyframes scan {
        0% {
          transform: translateY(0);
        }
        100% {
          transform: translateY(-80px);
        }
      }

      /* ── Hero Content ── */

      .hero-content {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 32px;
        max-width: 600px;
      }

      .logo svg {
        width: 360px;
        height: auto;
        filter: drop-shadow(0 0 30px rgba(160, 160, 200, 0.15));
      }

      .tagline {
        font-family: "JetBrains Mono", monospace;
        font-size: 16px;
        font-weight: 400;
        color: #7a7a94;
        letter-spacing: 4px;
        text-transform: uppercase;
      }

      .divider {
        width: 48px;
        height: 1px;
        background: #d8d8e4;
      }

      .description {
        font-size: 15px;
        line-height: 1.75;
        color: #6a6a7e;
        text-align: center;
        max-width: 480px;
      }

      /* ── Related Sites ── */

      .related {
        background: #f4f4fa;
        padding: 80px 24px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 40px;
      }

      .section-label {
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        font-weight: 600;
        color: #8a8a9e;
        letter-spacing: 3px;
        text-transform: uppercase;
      }

      .links-grid {
        display: flex;
        gap: 32px;
        flex-wrap: wrap;
        justify-content: center;
        max-width: 1100px;
      }

      .link-card {
        display: flex;
        flex-direction: column;
        gap: 8px;
        background: #ffffff;
        border: 1px solid #e2e2ee;
        border-radius: 8px;
        padding: 24px;
        width: 300px;
        cursor: pointer;
        text-decoration: none;
        color: inherit;
        transition:
          border-color 0.2s ease,
          box-shadow 0.2s ease,
          transform 0.2s ease,
          background 0.2s ease;
      }

      .link-card:hover {
        border-color: #0d6e6e;
        box-shadow: 0 4px 20px rgba(13, 110, 110, 0.1);
        transform: translateY(-2px);
        background: #f8fffe;
      }

      .link-card h3 {
        font-family: "JetBrains Mono", monospace;
        font-size: 15px;
        font-weight: 600;
        color: #1a1a2e;
      }

      .link-card p {
        font-size: 13px;
        line-height: 1.5;
        color: #6a6a80;
      }

      .link-card .link-label {
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        font-weight: 500;
        color: #0d6e6e;
        letter-spacing: 1px;
        margin-top: 4px;
      }

      /* ── Footer ── */

      .footer-divider {
        height: 1px;
        background: #e2e2ee;
      }

      footer {
        background: #f4f4fa;
        padding: 48px 24px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
      }

      footer .footer-logo {
        font-family: "JetBrains Mono", monospace;
        font-size: 13px;
        font-weight: 500;
        color: #aaaabb;
        letter-spacing: 2px;
      }

      footer .footer-copy {
        font-size: 12px;
        color: #b8b8c8;
      }

      /* ── Responsive ── */

      @media (max-width: 720px) {
        .logo svg {
          width: 260px;
        }
        .tagline {
          font-size: 13px;
          letter-spacing: 3px;
        }
        .links-grid {
          flex-direction: column;
          align-items: center;
        }
        .link-card {
          width: 100%;
          max-width: 360px;
        }
      }
    </style>
